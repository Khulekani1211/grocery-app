<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/src/output.css" rel="stylesheet">
    <title>Grocery Budget</title>
</head>
<body class="bg-slate-100 min-h-screen">
    
    <div class="max-w-6xl mx-auto p-4"> <!-- App Container --> 
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4"> <!-- INPUT PANEL --> 
            <section class="bg-white rounded-2xl shadow-lg p-5 md:sticky md:top-4 h-fit"> 
                <h1 class="text-2xl font-bold text-green-600 mb-5"> 🛒 Grocery Planner </h1> 
                <div class="space-y-4">
                    <input id="budget0" type="number" placeholder="What's Your Budget" class="w-full border rounded-xl p-3"> 
                    <input id="itemName" type="text" placeholder="Item name" class="w-full border rounded-xl p-3"> 
                    <input id="price" type="number" placeholder="Price" class="w-full border rounded-xl p-3"> 
                    <input id="qty" type="number" placeholder="Quantity" class="w-full border rounded-xl p-3"> 
                    <button onclick="addItem()" class="w-full bg-green-500 text-white p-3 rounded-xl font-bold hover:bg-green-600"> Add Item </button> 
                </div> 
                    
                    <div class="mt-6 bg-slate-100 rounded-xl p-4"> 
                        <p class="text-sm text-gray-500">Current Total</p> 
                        <h2 class="text-3xl font-bold"> R<span id="grandTotal">0.00</span> </h2> 
                    </div>

                    <div class="mt-6 bg-green-300 rounded-xl p-4"> 
                        <p class="text-sm text-gray-500">Remaining Budget</p> 
                        <h2 class="text-3xl text-shadow-black font-bold"> R<span id="remainingBudget">0.00</span> </h2> 
                    </div> 

                </section> 
                
                <!-- RESULTS PANEL --> 
                 <section class="bg-white rounded-2xl shadow-lg p-5"> 
                    <h2 class="text-xl font-bold mb-4"> Grocery List </h2> 
                    <div id="list" class="space-y-3"></div> 
                </section> 
            </div> 
        </div>
    </div>
    <script src="/src/app.js"></script>
</body>
</html>
